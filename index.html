<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="quiz-container">

<h1>Quiz App</h1>

<div id="timer">Time: 10</div>

<h2 id="question"></h2>

<ul>
<li>
<input type="radio" name="answer" id="a">
<label id="a_text"></label>
</li>

<li>
<input type="radio" name="answer" id="b">
<label id="b_text"></label>
</li>

<li>
<input type="radio" name="answer" id="c">
<label id="c_text"></label>
</li>

<li>
<input type="radio" name="answer" id="d">
<label id="d_text"></label>
</li>
</ul>

<button id="submit">Next</button>

</div>

<script src="script.js"></script>

</body>
</html>
